name: Playwright (playwright-ts)

on:
  push:
    branches: [main, master]
    paths:
      - "playwright-ts/**"
      - ".github/workflows/playwright-ts.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "playwright-ts/**"
      - ".github/workflows/playwright-ts.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: playwright-ts

jobs:
  test:
    name: npm run test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: playwright-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test
